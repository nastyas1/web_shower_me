{% extends 'booking/base.html' %}
{% block content %}
<div class="card">
    <h2>Забронировать время</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group"><label>Дата</label><input type="date" name="date" class="form-control" required min="{{ today }}"></div>
        <div class="form-group">
            <label>Время</label>
            <select name="time" class="form-control" required>
                <option value="">Выберите</option>
                <option value="08:00">08:00</option><option value="09:00">09:00</option><option value="10:00">10:00</option>
                <option value="11:00">11:00</option><option value="12:00">12:00</option><option value="13:00">13:00</option>
                <option value="14:00">14:00</option><option value="15:00">15:00</option><option value="16:00">16:00</option>
                <option value="17:00">17:00</option><option value="18:00">18:00</option><option value="19:00">19:00</option><option value="20:00">20:00</option>
            </select>
        </div>
        <div class="form-group">
            <label>Длительность</label>
            <select name="duration" class="form-control" required>
                <option value="15">15 мин</option><option value="30">30 мин</option><option value="45">45 мин</option><option value="60">1 час</option>
            </select>
        </div>
        <button type="submit" class="btn">Подтвердить</button>
    </form>
</div>
{% endblock %}
