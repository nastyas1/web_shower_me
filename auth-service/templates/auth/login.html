{% extends 'auth/base.html' %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <h2>Вход в систему</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group"><label>Имя пользователя</label><input type="text" name="username" class="form-control" required></div>
        <div class="form-group"><label>Пароль</label><input type="password" name="password" class="form-control" required></div>
        <button type="submit" class="btn" style="width: 100%;">Войти</button>
    </form>
    <p style="margin-top: 15px; text-align: center;">Нет аккаунта? <a href="/signup/">Зарегистрироваться</a></p>
</div>
{% endblock %}
