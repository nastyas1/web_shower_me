version: "3.9"

# ============================================================
#  Микросервисная архитектура — душевые | Общежитие
#  Запуск: docker compose up --build
#  API gateway: http://localhost
# ============================================================

services:

  # ── Общая база данных (одна СУБД, разные схемы/БД) ────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Auth Service (port 8001) ───────────────────────────────
  auth-service:
    build: ./auth-service
    restart: unless-stopped
    env_file: 
      - .env

    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  # ── Booking Service (port 8002) ────────────────────────────
  booking-service:
    build: ./booking-service
    restart: unless-stopped
    env_file:
      - .env

    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  # ── Comments Service (port 8003) — SSE ─────────────────────
  comments-service:
    build: ./comments-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: comments_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  # ── Feedback Service (port 8004) ───────────────────────────
  feedback-service:
    build: ./feedback-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: feedback_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  # ── Nginx — API Gateway ────────────────────────────────────
  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - booking-service
      - comments-service
      - feedback-service

volumes:
  pg_data:
