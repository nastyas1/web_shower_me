version: "3.9"

# ============================================================
#  Микросервисная архитектура — душевые | Общежитие
#  Запуск: docker compose up --build
#  API gateway: http://localhost
# ============================================================

services:

  # ── Общая база данных (одна СУБД, разные схемы/БД) ────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Auth Service (port 8001) ───────────────────────────────
  auth-service:
    build: ./auth-service
    restart: unless-stopped
    env_file: 
      - .env
    environment:
      DB_ENGINE: ${DB_ENGINE}
      DB_NAME_AUTH: ${DB_NAME_AUTH}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST_AUTH: ${DB_HOST_AUTH}
      DB_PORT: ${DB_PORT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS_AUTH: ${ALLOWED_HOSTS_AUTH}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      FEEDBACK_SERVICE_URL: ${FEEDBACK_SERVICE_URL}
      BOOKING_SERVICE_URL: ${BOOKING_SERVICE_URL}
      COMMENTS_SERVICE_URL: ${COMMENTS_SERVICE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  # ── Booking Service (port 8002) ────────────────────────────
  booking-service:
    build: ./booking-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_ENGINE: ${DB_ENGINE}
      DB_NAME_BOOKING: ${DB_NAME_BOOKING}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST_BOOKING: ${DB_HOST_BOOKING}
      DB_PORT: ${DB_PORT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS_BOOKING: ${ALLOWED_HOSTS_BOOKING}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      FEEDBACK_SERVICE_URL: ${FEEDBACK_SERVICE_URL}
      BOOKING_SERVICE_URL: ${BOOKING_SERVICE_URL}
      COMMENTS_SERVICE_URL: ${COMMENTS_SERVICE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  # ── Comments Service (port 8003) — SSE ─────────────────────
  comments-service:
    build: ./comments-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_ENGINE: ${DB_ENGINE}
      DB_NAME_COMMENTS: ${DB_NAME_COMMENTS}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST_COMMENTS: ${DB_HOST_COMMENTS}
      DB_PORT: ${DB_PORT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS_COMMENTS: ${ALLOWED_HOSTS_COMMENTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      FEEDBACK_SERVICE_URL: ${FEEDBACK_SERVICE_URL}
      BOOKING_SERVICE_URL: ${BOOKING_SERVICE_URL}
      COMMENTS_SERVICE_URL: ${COMMENTS_SERVICE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  # ── Feedback Service (port 8004) ───────────────────────────
  feedback-service:
    build: ./feedback-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_ENGINE: ${DB_ENGINE}
      DB_NAME_FEEDBACK: ${DB_NAME_FEEDBACK}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST_FEEDBACK: ${DB_HOST_FEEDBACK}
      DB_PORT: ${DB_PORT}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS_FEEDBACK: ${ALLOWED_HOSTS_FEEDBACK}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      VK_GROUP_TOKEN: ${VK_GROUP_TOKEN}
      VK_GROUP_ID: ${VK_GROUP_ID}
      VK_ADMIN_ID: ${VK_ADMIN_ID}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      FEEDBACK_SERVICE_URL: ${FEEDBACK_SERVICE_URL}
      BOOKING_SERVICE_URL: ${BOOKING_SERVICE_URL}
      COMMENTS_SERVICE_URL: ${COMMENTS_SERVICE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  # ── Nginx — API Gateway ────────────────────────────────────
  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - booking-service
      - comments-service
      - feedback-service

volumes:
  pg_data:
