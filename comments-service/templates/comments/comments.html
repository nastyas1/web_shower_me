{% extends 'comments/base.html' %}
{% block content %}
<div class="card">
    <h2>Комментарии</h2>
    {% if comments %}
        {% for c in comments %}<div style="border-bottom:1px solid #eee; padding:10px 0;"><strong>{{ c.user }}</strong>: {{ c.text }}</div>{% endfor %}
    {% else %}<p>Комментариев нет.</p>{% endif %}
    <form method="post" style="margin-top:20px;">{% csrf_token %}
        <div class="form-group"><textarea class="form-control" rows="3" placeholder="Текст..." name="text"></textarea></div>
        <button type="submit" class="btn">Отправить</button>
    </form>
</div>
{% endblock %}
